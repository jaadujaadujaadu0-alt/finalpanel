<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aura - Allocate Numbers</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { margin: 0; padding: 0; background-color: #f1f1f1; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 240px; background-color: #e9e9e9; border-right: 1px solid #ccc; display: flex; flex-direction: column; height: 100%; flex-shrink: 0; }
        .sidebar-header { padding: 15px; text-align: center; color: #333; font-size: 13px; line-height: 1.5; border-bottom: 1px solid #d0d0d0; background: #e0e0e0; }
        .sidebar-header strong { color: #000; display: block; font-size: 14px; }
        .menu-list { list-style: none; padding: 0; margin: 0; width: 100%; }
        .menu-item a { display: flex; align-items: center; padding: 12px 15px; text-decoration: none; color: white; font-weight: bold; font-size: 12px; text-transform: uppercase; border-bottom: 1px solid #000; background: linear-gradient(to bottom, #3c3c3c 0%, #111111 100%); position: relative; }
        .menu-item a:hover, .menu-item.active a { background: linear-gradient(to bottom, #555555 0%, #222222 100%); color: #fff; }
        .menu-item a i { margin-right: 10px; font-size: 16px; width: 20px; text-align: center; color: #b5b5b5; }
        .main-container { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-navbar { height: 50px; background: linear-gradient(to bottom, #2b2b2b 0%, #111111 100%); display: flex; align-items: center; padding: 0 20px; }
        .logo-text { font-size: 28px; font-weight: bold; font-style: italic; background: linear-gradient(to bottom, #4fa3ff, #9b51e0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .content { padding: 20px; overflow-y: auto; flex-grow: 1; }
        
        .panel-card { background: white; border: 1px solid #ccc; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); max-width: 600px; margin: 0 auto; }
        .panel-header { background: linear-gradient(to bottom, #eaeaea 0%, #dcdcdc 100%); padding: 12px 15px; border-bottom: 1px solid #ccc; font-weight: bold; color: #333; display: flex; align-items: center; font-size: 14px; text-transform: uppercase; }
        .panel-header i { margin-right: 8px; color: #555; }
        .panel-body { padding: 20px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 7px; font-size: 13px; font-weight: bold; color: #333; }
        .form-group select, .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .btn-submit { width: 100%; background: linear-gradient(to bottom, #4fa3ff, #0056b3); color: white; border: none; padding: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 14px; text-transform: uppercase; }
        .alert-flash { padding: 12px; background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; border-radius: 4px; margin-bottom: 20px; font-size: 13px; text-align: center; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            Welcome <strong>{{ session['username'] }}</strong><br>
            <span>Agent Workstation</span>
        </div>
        <ul class="menu-list">
            <li class="menu-item"><a href="{{ url_for('agent_report') }}"><i class="fa-solid fa-file-invoice mr-2"></i> Report</a></li>
            <li class="menu-item active"><a href="{{ url_for('agent_allocate') }}"><i class="fa-solid fa-layer-group"></i> Number Allocation</a></li>
            <li class="menu-item"><a href="{{ url_for('agent_my_numbers') }}"><i class="fa-solid fa-list-check"></i> My Numbers</a></li>
            <li class="menu-item"><a href="{{ url_for('agent_clients') }}"><i class="fa-solid fa-user-group"></i> Clients</a></li>
            <li class="menu-item" style="margin-top: 20px;"><a href="{{ url_for('logout') }}" style="background: linear-gradient(to bottom, #9b2226, #bb3e03);"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
        </ul>
    </div>
    <div class="main-container">
        <div class="top-navbar"><div class="logo-text">Aura</div></div>
        <div class="content">
            {% with messages = get_flashed_messages() %}
                {% if messages %}{% for msg in messages %}<div class="alert-flash">{{ msg }}</div>{% endfor %}{% endif %}
            {% endwith %}

            <div class="panel-card">
                <div class="panel-header"><i class="fa-solid fa-square-plus"></i> Bulk Number Allocation Request</div>
                <div class="panel-body">
                    <form method="POST">
                        <div class="form-group">
                            <label>Select Target Range</label>
                            <select name="num_range" required>
                                <option value="" disabled selected>-- Choose an available scudo range --</option>
                                {% for r in ranges %}
                                    <option value="{{ r.num_range }}">{{ r.scudo_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Allocation Quantity</label>
                            <input type="number" name="quantity" min="1" placeholder="e.g. 10" required>
                        </div>
                        <button type="submit" class="btn-submit">Submit Allocation Request</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
